<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 게임 — AI Play Daily</title>
  <meta name="description" content="AI Play Daily의 모든 게임을 카테고리별로 찾아보세요.">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">AI Play Daily</a>

      <div class="search-bar">
        <input type="search" placeholder="게임 검색...">
      </div>

      <nav class="site-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="games.html" class="nav-link is-active">Games</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
    </div>
  </header>

  <main class="site-main">

    <section class="hero">
      <div class="container">
        <h1>전체 게임</h1>
        <p>카테고리를 선택해서 원하는 게임을 찾아보세요.</p>
      </div>
    </section>

    <section class="container">
      <div class="chip-group">
        <button type="button" class="chip is-active" data-category="all">ALL</button>
        <button type="button" class="chip" data-category="arcade">Arcade</button>
        <button type="button" class="chip" data-category="puzzle">Puzzle</button>
        <button type="button" class="chip" data-category="action">Action</button>
        <button type="button" class="chip" data-category="ai">AI</button>
        <button type="button" class="chip" data-category="casual">Casual</button>
        <button type="button" class="chip" data-category="strategy">Strategy</button>
        <button type="button" class="chip" data-category="simulation">Simulation</button>
      </div>
    </section>

    <section class="container">
      <div id="game-grid" class="game-grid">
        <!-- 게임 카드는 js/catalog.js에서 동적으로 렌더링됩니다 -->
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 AI Play Daily. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/catalog.js"></script>
</body>
</html>
